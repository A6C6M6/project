<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My-Kids-Hub</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="main-wrapper">
        <div class="left-section">
            <div class="logo-box">
                <img src="https://cdn-icons-png.flaticon.com/512/3408/3408545.png" alt="Logo" class="logo-img">
                <h1>My-Kids-<span>Hub</span></h1>
                <p>School Fee Management</p>
            </div>
            
            <img src="https://img.freepik.com/free-vector/happy-children-holding-books_1308-32333.jpg" alt="School Kids" class="hero-img">
            
            <p class="tagline">Smart School. Happy Parents. Bright Future.</p>
        </div>

        <div class="right-section">
            <form id="loginForm">
                <h2>Welcome Back!</h2>
                <p class="sub-text">Sign in to continue to My-Kids-Hub</p>
                
                <label>Email Address</label>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <label>Password</label>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" id="loginBtn">Login</button>
                
                <div class="divider">or</div>
                
                <button type="button" class="google-btn"><i class="fab fa-google"></i> Login with Google</button>
                
                <p class="signup-link">Don't have an account? <a href="#">Sign Up</a></p>
            </form>
        </div>
    </div>
    <script src="assets/js/app.js"></script>
</body>
</html>
