<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My-Kids-Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #eef2f7; display: flex; height: 100vh; justify-content: center; align-items: center; }
        .main-wrapper { display: flex; width: 950px; height: 650px; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .left-section { width: 45%; background: #0056b3; color: white; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .right-section { width: 55%; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; }
        button { width: 100%; padding: 15px; background: #0056b3; color: white; border: none; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="left-section">
            <h1>My-Kids-Hub</h1>
            <p>School Fee Management</p>
            <p>Smart School. Happy Parents. Bright Future.</p>
        </div>
        <div class="right-section">
            <form id="loginForm">
                <h2>Welcome Back!</h2>
                <input type="email" placeholder="Enter your email" required>
                <input type="password" placeholder="Enter your password" required>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
